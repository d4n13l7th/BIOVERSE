<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BIOVERSE — Platform pembelajaran multisensori adaptif untuk Anak Berkebutuhan Khusus (ABK). Mendukung siswa Autis, Tunanetra, dan Tunarungu.">
  <meta name="theme-color" content="#1a1040">

  <title>{% block title %}BIOVERSE{% endblock %}</title>

  <!-- Google Fonts: Nunito + Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Global CSS -->
  <link rel="stylesheet" href="/static/css/global.css">

  <!-- Page-specific CSS -->
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}

  <!-- Global JS -->
  <script src="/static/js/app.js"></script>
  <script src="/static/js/hapticFeedback.js"></script>

  <!-- Page-specific JS -->
  {% block extra_js %}{% endblock %}
</body>
</html>
